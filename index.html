<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo Nobrega | MarOps & AI Specialist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Source Sans 3', sans-serif; }
        .animate-fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Ajuste para ícones lucide não carregarem antes do tempo */
        [data-lucide] { width: 24px; height: 24px; }
    </style>
</head>
<body class="bg-[#020617] text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Componente de Ícone para lidar com a biblioteca externa
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                if (window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Sobre', href: '#sobre' },
                { name: 'Stack', href: '#stack' },
                { name: 'Cases', href: '#cases' },
                { name: 'Contato', href: '#contato' },
            ];

            return (
                <div className="min-h-screen bg-[#020617] selection:bg-[#075FE4] selection:text-white">
                    {/* Navegação */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-[#020617]/90 backdrop-blur-md py-4 border-b border-white/10' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-[#075FE4] rounded-lg flex items-center justify-center font-bold text-xl text-white">L</div>
                                <span className="font-bold text-xl tracking-tight hidden sm:block uppercase">Leonardo Nobrega</span>
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className="text-sm font-medium hover:text-[#075FE4] transition-colors uppercase tracking-wider">
                                        {link.name}
                                    </a>
                                ))}
                            </div>
                            <a href="#contato" className="bg-[#075FE4] hover:bg-[#075FE4]/80 px-5 py-2 rounded-full text-sm font-bold transition-all transform hover:scale-105 active:scale-95">
                                CONTATO
                            </a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-32 pb-20 md:pt-48 md:pb-32 overflow-hidden">
                        <div className="absolute top-1/4 -left-20 w-96 h-96 bg-[#075FE4]/20 rounded-full blur-[120px]" />
                        <div className="absolute bottom-1/4 -right-20 w-96 h-96 bg-[#075FE4]/10 rounded-full blur-[120px]" />

                        <div className="max-w-7xl mx-auto px-6 relative z-10 text-center md:text-left md:flex items-center gap-12">
                            <div className="flex-1">
                                <div className="inline-flex items-center gap-2 px-4 py-1 rounded-full border border-[#075FE4]/30 bg-[#075FE4]/10 text-[#075FE4] text-xs font-bold tracking-widest uppercase mb-6 animate-fade-in">
                                    <Icon name="zap" size={14} /> High-Tech, High-Touch
                                </div>
                                <h1 className="text-5xl md:text-7xl font-bold leading-tight mb-6">
                                    Estratégia em dados. <br />
                                    <span className="text-[#075FE4]">Inovação em escala.</span>
                                </h1>
                                <p className="text-xl text-slate-400 mb-8 max-w-2xl leading-relaxed">
                                    Transformando objetivos de negócio em resultados escaláveis através da convergência entre estratégia de dados, MarTech e agentes de IA.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                                    <a href="#cases" className="bg-[#075FE4] hover:bg-[#075FE4]/80 px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all group">
                                        VER PROJETOS <Icon name="chevron-right" size={18} className="group-hover:translate-x-1 transition-transform" />
                                    </a>
                                    <a href="#stack" className="border border-white/20 hover:border-[#075FE4] px-8 py-4 rounded-xl font-bold transition-all bg-white/5 backdrop-blur-sm">
                                        MINHA TECH STACK
                                    </a>
                                </div>
                            </div>
                            <div className="hidden lg:block flex-1 relative">
                                <div className="relative w-full aspect-square max-w-md mx-auto">
                                    <div className="absolute inset-0 border border-[#075FE4]/30 rounded-full animate-pulse" />
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl transform hover:scale-105 transition-transform duration-300">
                                                <Icon name="cpu" size={32} className="text-[#075FE4] mb-3" />
                                                <h3 className="font-bold text-sm">IA & Agentes</h3>
                                            </div>
                                            <div className="p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl transform translate-y-8 hover:scale-105 transition-transform duration-300">
                                                <Icon name="workflow" size={32} className="text-[#075FE4] mb-3" />
                                                <h3 className="font-bold text-sm">Automação</h3>
                                            </div>
                                            <div className="p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl transform -translate-y-4 hover:scale-105 transition-transform duration-300">
                                                <Icon name="bar-chart-3" size={32} className="text-[#075FE4] mb-3" />
                                                <h3 className="font-bold text-sm">Growth Ops</h3>
                                            </div>
                                            <div className="p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl transform translate-y-4 hover:scale-105 transition-transform duration-300">
                                                <Icon name="brain" size={32} className="text-[#075FE4] mb-3" />
                                                <h3 className="font-bold text-sm">Criatividade</h3>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Triângulo de Poder */}
                    <section id="sobre" className="py-24 bg-[#010411]">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-5xl font-bold mb-4">O Triângulo de Poder</h2>
                                <p className="text-slate-400 max-w-2xl mx-auto">Minha abordagem une o rigor analítico dos dados com a eficiência da tecnologia e a diferenciação da criatividade humana.</p>
                            </div>
                            <div className="grid md:grid-cols-3 gap-8">
                                <div className="p-8 rounded-3xl bg-slate-900/50 border border-white/5 hover:border-[#075FE4]/30 transition-all group">
                                    <Icon name="target" size={28} className="text-[#075FE4] mb-6" />
                                    <h3 className="text-2xl font-bold mb-3">Estratégia</h3>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-4">O CÉREBRO: Assertividade na tomada de decisão baseada em dados e métricas reais (ROI, LTV, CAC).</p>
                                </div>
                                <div className="p-8 rounded-3xl bg-slate-900/50 border border-[#075FE4]/20 shadow-2xl transition-all group scale-105 relative">
                                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-[#075FE4] text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">Main Driver</div>
                                    <Icon name="cpu" size={28} className="text-[#075FE4] mb-6" />
                                    <h3 className="text-2xl font-bold mb-3">Inovação</h3>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-4">O MOTOR: Capacidade de superar desafios operacionais através de MarOps e IA Generativa.</p>
                                </div>
                                <div className="p-8 rounded-3xl bg-slate-900/50 border border-white/5 hover:border-[#075FE4]/30 transition-all group">
                                    <Icon name="brain" size={28} className="text-[#075FE4] mb-6" />
                                    <h3 className="text-2xl font-bold mb-3">Criatividade</h3>
                                    <p className="text-slate-400 text-sm leading-relaxed mb-4">A ALMA: O lado humano; a capacidade de enxergar além do óbvio e criar conexões reais.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Rodapé / Contato */}
                    <section id="contato" className="py-24 text-center">
                        <div className="max-w-4xl mx-auto px-6">
                            <h2 className="text-4xl md:text-6xl font-bold mb-8">Vamos escalar seu marketing?</h2>
                            <div className="flex flex-col sm:flex-row gap-6 justify-center">
                                <a href="https://www.linkedin.com/in/nobregasleo" target="_blank" className="bg-[#075FE4] px-10 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all hover:bg-[#075FE4]/80">
                                    <Icon name="linkedin" /> LINKEDIN
                                </a>
                                <a href="mailto:nobregasleo@gmail.com" className="bg-white/10 border border-white/20 px-10 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all hover:bg-white/20">
                                    <Icon name="mail" /> E-MAIL
                                </a>
                            </div>
                            <p className="mt-20 text-slate-500 text-xs uppercase tracking-widest">© 2026 Leonardo Nobrega • Santos, SP • Remote / Hybrid</p>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
